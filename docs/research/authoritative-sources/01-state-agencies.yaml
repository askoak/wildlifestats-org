# ============================================================
# Summary:
# ============================================================
#
# Total jurisdictions covered: 51 (50 states + DC)
#
# MATERIAL TYPE COUNTS (approximate, based on research as of 2025):
#
# | Material Type                              | States with Material | States Without |
# |--------------------------------------------|----------------------|----------------|
# | Rehabber licensing URL                     | 51 / 51 (100%)       | 0              |
# | Public wildlife help / injured-animal page | 48 / 51 (~94%)       | 3 (sparse)     |
# | Rehabber directory (public)                | ~22 / 51 (~43%)      | ~29            |
# | State-published rehab handbook/manual/PDF  | ~12 / 51 (~24%)      | ~39            |
# | CWD program URL                            | ~35 / 51 (~69%)      | ~16            |
# | HPAI program URL                           | ~18 / 51 (~35%)      | ~33            |
# | Rehab coordinator name published           | 0 / 51 (0%)          | 51             |
# | Rehab coordinator email published          | ~2 / 51 (~4%)        | ~49            |
#
# NOTE: Coordinator names/contacts are rarely published on state agency websites;
# most states direct inquiries through general permit offices or email forms.
# Minnesota is notable for publishing a permit email address
# (dnr.wildlife.rehabpermit@state.mn.us). Texas publishes a permits office email
# (WPoffice@tpwd.texas.gov). Georgia publishes an exam phone number (770-918-6408).
#
# ============================================================
# BIGGEST GAPS — States with the least published material:
# ============================================================
#
# 1. WEST VIRGINIA — Minimal web presence for rehabilitation; statute exists
#    (WV Code § 20-2D-4) but no dedicated permit page, no handbook, no directory.
#
# 2. IDAHO — Notably restrictive/limited rehabilitation program; IDFG reportedly
#    restricts private rehabilitation; minimal public resources.
#
# 3. MISSISSIPPI — Basic rehabilitation page; no directory, no handbook, no
#    disease reporting pages identified.
#
# 4. ALABAMA — Rehabilitation page exists but limited; no handbook or directory.
#
# 5. NEVADA — NDOW rehabilitation page exists but content very sparse; no
#    directory or handbook. State relies on private organizations (Nevada Audubon).
#
# 6. ARKANSAS — Limited rehabilitation content; permit available but no handbook
#    or directory.
#
# 7. KANSAS — Special licenses listing exists but minimal dedicated rehabilitation
#    content; no handbook or directory.
#
# 8. VERMONT — Limited web presence; regulations exist but no dedicated handbook
#    or directory.
#
# 9. NEW HAMPSHIRE — Regulations codified (N.H. Admin. Code § Fis 812.01) but
#    minimal public-facing agency content.
#
# 10. NORTH DAKOTA — Basic pages; limited rehabilitation-specific materials beyond
#     orphaned animals guidance and CWD surveillance.
#
# ============================================================
# BEST-IN-CLASS — States with the most published material:
# ============================================================
#
# 1. CALIFORNIA (CDFW) — Regulations manual PDF, permitted rehabilitator directory,
#    HPAI monitoring, training/resources page, laws and regulations page. Most
#    comprehensive state framework identified.
#
# 2. MICHIGAN (MDNR) — Detailed permit information page covering permit types,
#    species-specific rules, disease requirements, care standards, and display rules.
#    Public licensed rehabilitator directory. Active HPAI and CWD pages.
#
# 3. NEW YORK (NYSDEC) — Published Wildlife Rehabilitation Study Guide PDF (2013),
#    licensed rehabilitator directory, animal diseases page, bird flu monitoring platform.
#
# 4. MINNESOTA (MN DNR) — Study guide and exam book, permit instructions, sick/injured
#    wildlife guidance, published permit email address, active CWD program.
#
# 5. VIRGINIA (DWR) — Permit conditions PDF (handbook equivalent), public rehabber
#    directory, injured wildlife public guidance, CWD program. Active social media presence
#    on bear policy and CWD.
#
# 6. FLORIDA (FWC) — Comprehensive licensing page, public rehabber directory, wildlife
#    health program, HPAI and CWD (newly detected) monitoring. Executive orders affecting
#    rehabilitators during CWD response.
#
# 7. TEXAS (TPWD) — Permit application, facility guidelines, approved training list,
#    public rehabber directory, permits email address, active HPAI alerts.
#
# 8. GEORGIA (DNR-WRD) — Application and study guide PDF, exam requirement with
#    contact phone, public rehabber directory, CWD page.
#
# 9. INDIANA (IDFW) — Permit instructions PDF, public rehabber directory, CWD pages.
#
# 10. WISCONSIN (WDNR) — Licensing page, public directory, disease page, wildlife
#     health portal. Strong CWD and HPAI monitoring infrastructure.
#
# ============================================================
# REGIONAL PATTERNS:
# ============================================================
#
# - MIDWEST / GREAT LAKES (MN, WI, MI, IN, OH, IA): Generally strong programs with
#   directories and handbooks, partly driven by long history of CWD in the region and
#   active CWD surveillance requirements.
#
# - NORTHEAST (NY, NJ, CT, MA, MD, RI, PA): Generally above-average public materials;
#   NY and NJ particularly strong. DE and NH are lighter.
#
# - SOUTH (FL, GA, VA, TN, TX): Florida and Virginia are best-in-class for the region;
#   TX strong on permit/directory side. MS, WV, AL are the regional laggards.
#
# - MOUNTAIN WEST / PLAINS (CO, WY, MT, ID, UT): CWD programs well-developed (given
#   the disease originated here), but public rehabilitation handbook content is sparse.
#   Idaho is notable for restrictive rehabilitation policies.
#
# - PACIFIC (CA, OR, WA): California dominates with the most comprehensive state program
#   nationally. Oregon publishes administrative rules PDF. Washington relies heavily on
#   the WWRA nonprofit for training and directories.
#
# - CWD COVERAGE: States in the CWD-endemic zone (WY, CO, MT, SD, NE, MN, WI, MI, PA,
#   VA, MD, NY, TN, GA, FL newly detected) generally publish more disease-related
#   rehabber guidance. FL is a notable recent addition (2025) with executive orders
#   directly impacting rehabbers.
#
# - MIGRATORY BIRD INTERFACE: Most states do not independently publish a "migratory bird
#   coordinator" — this interface is handled federally through USFWS Regional Migratory
#   Bird Coordinators (Pacific Flyway, Central Flyway, Mississippi Flyway, Atlantic Flyway).
#   State-level migratory bird contacts are rarely published on state wildlife agency sites.
#
# - ENDANGERED SPECIES COORDINATORS: Similarly rarely published at the state agency level
#   in a form accessible to the public; typically handled through USFWS state liaison or
#   state nongame/endangered species programs. Illinois is notable for its Endangered and
#   Threatened Species Rehabilitation Grants program.
#
# - HPAI RESPONSE (2024-2025): The ongoing HPAI H5N1 outbreak has prompted more states
#   to publish avian influenza guidance; states with active monitoring pages identifiable
#   include CA, FL, CT, DE, ME, MA, MI, NY, PA, TX, WI. States without dedicated HPAI
#   pages are likely handling through USDA/APHIS coordination rather than publishing
#   independently.
#
# Data collection date: 2025. Source material primarily drawn from official state
# wildlife agency websites. Some URLs may change as agency websites are redesigned.
# Coordinator names were not published on any identified state agency pages as of
# research date; contact information where noted reflects general permit office contacts.
