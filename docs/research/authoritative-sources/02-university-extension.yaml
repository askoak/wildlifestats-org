#        EDIS publications are explicitly designed for broad public dissemination
#     2. USGS National Wildlife Health Center — federal authority on wildlife
#        disease; Wildlife Health Bulletins define national disease content
#     3. University of Minnesota Raptor Center — definitive national raptor rehab
#        training program (Raptor Academy); HPAI tracking data
#     4. Cornell Wildlife Health Lab — CWD and surveillance leadership;
#        New York DEC partnership gives real-world validation
