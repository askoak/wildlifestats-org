#   covering Florida's unique biodiversity. Each follows a consistent structure
#   (description, biology, behavior, management, conservation status) making
#   them ideal templates for a national wildlife rehabilitation content library.
#   Second choice: NC State's Working With Wildlife series (WWW series, 24+
#   publications, strong practical content, excellent illustrations, free).
