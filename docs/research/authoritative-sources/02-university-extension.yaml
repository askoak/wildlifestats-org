# University Extension + Veterinary School Wildlife Catalog
# WildlifeStats National Research Framework — Authoritative Sources Tier 2
# Compiled: 2025
# Coverage: Cooperative Extension programs, veterinary school wildlife clinics,
#           federal research institutions, conservation science centers.
#
# Quality tier key:
#   GOLD     — prolific, peer-reviewed, publicly archived, actively updated
#   SILVER   — solid but narrower scope or smaller catalog
#   BRONZE   — present and credible but thin offerings or limited public access

---

# ============================================================
# COOPERATIVE EXTENSION PROGRAMS
# ============================================================

- slug: uf-ifas-extension-wildlife
  institution: "University of Florida"
  program: "UF/IFAS Extension — Wildlife"
  type: "cooperative_extension"
  quality_tier: GOLD
  primary_url: "https://ask.ifas.ufl.edu"
  publications_url: "https://ask.ifas.ufl.edu/collections/series_wildlife_of_florida"
  edis_url: "https://edis.ifas.ufl.edu/topic/wildlife"
  notable_publications:
    - title: "Wildlife of Florida Factsheets (18-publication series)"
      url: "https://ask.ifas.ufl.edu/collections/series_wildlife_of_florida"
      type: "fact_sheet"
      species_covered: "Florida-specific vertebrates — armadillo, burrowing owl, Florida scrub-jay, manatee, gopher tortoise, and more"
      year: 2023
    - title: "Living With Wildlife in Florida"
      url: "https://ask.ifas.ufl.edu/publication/WC185"
      type: "bulletin"
      species_covered: "general human-wildlife conflict, urban wildlife"
      year: 2022
    - title: "EDIS Wildlife & Ecology publications archive (1,000+ documents)"
      url: "https://edis.ifas.ufl.edu/department/wec"
      type: "fact_sheet"
      species_covered: "full breadth — reptiles, birds, mammals, invertebrates, aquatic species"
      year: 2024
  rehabilitator_training_program: false
  wildlife_disease_lab: false
  cwd_testing: false
  hpai_testing: false
  contact:
    program_lead: "UF/IFAS Wildlife Ecology and Conservation Department"
    email: "https://edis.ifas.ufl.edu/contact"
  notes: >
    GOLD STANDARD. The largest and most comprehensive open-access wildlife extension
    publication repository in the United States. EDIS (Electronic Data Information
    Source) hosts 1,000+ peer-reviewed wildlife documents, all freely downloadable as
    PDFs. Topics span human-wildlife conflict, species ID, habitat management,
    disease, venomous species, and exotic/invasive species. Florida's biodiversity
    (reptiles, subtropical birds, marine mammals) gives this collection unique coverage
    not found elsewhere. Every wildlife rehab content project should prioritize IFAS.
  source_urls:
    - "https://ask.ifas.ufl.edu/collections/series_wildlife_of_florida"
    - "https://edis.ifas.ufl.edu/topic/wildlife"
    - "https://ask.ifas.ufl.edu/publications"

