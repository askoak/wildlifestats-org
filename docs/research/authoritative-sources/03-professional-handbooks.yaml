## Top 5–10 Most Useful Sources for WildlifeStats Content Sourcing

1. **NWRA/IWRC Standards for Wildlife Rehabilitation, 5th ed. (2021)** — The current legal-standard-referenced document for US wildlife rehabilitation. Any WildlifeStats clinical guidance on housing, husbandry, or release criteria must align with or cite this. Institutional access needed ($40 print).

2. **USGS Field Manual of Wildlife Diseases (1999 + Living Edition)** — Free federal publication covering all major avian diseases. The single most freely citeable disease reference in the field. Essential for disease-specific WildlifeStats content.

3. **NWRA Wildlife Rehabilitation Bulletin** — Open-access peer-reviewed journal from NWRA. Freely quotable with attribution. Best free peer-reviewed source for clinical and husbandry content.

4. **Merck Veterinary Manual (online)** — Freely accessible, continuously updated, comprehensive. Excellent for species overview pages and disease descriptions. Author organization lends credibility.

5. **WHISPers Database (USGS NWHC)** — Unique source for event-level wildlife mortality data by species and location. High value for any statistical or incidence-based WildlifeStats content. Free web access.

6. **NASPHV Rabies Compendium (annual)** — Free, authoritative, and legally referenced. Must-cite for any content on rabies vector species, exposure protocols, or public health risk to rehabilitators.

7. **50 CFR Part 21 (MBTA Permits) and §21.76** — Free, authoritative legal text. Must-cite for all bird rehabilitation legal framework content. eCFR always current.

8. **Hand-Rearing Birds, 2nd ed. (Duerr & Gage, 2020)** — The definitive avian hand-rearing reference. 816 pages covering nearly all North American bird taxa. High-quality clinical content; worth institutional acquisition (Wiley-Blackwell, ~$120–150).

9. **Carpenter's Exotic Animal Formulary, 6th ed. (2022)** — The only drug formulary specific to exotic/wildlife species. Essential for any pharmacology or treatment dosing content. Elsevier; institutional access via Evolve.

10. **CWR Exam Handbook (2023, free PDF)** — Meta-source: the profession's own reading list. Validates which texts are considered authoritative. Free and citable as evidence of professional consensus.

---

## High-Value Sources Warranting Institutional/Library Access

The following paywalled sources have high return-on-investment for WildlifeStats and are worth pursuing through institutional subscriptions or library access:

- **Journal of Wildlife Diseases** (BioOne) — The premier peer-reviewed journal in the field. WildlifeStats should pursue institutional access; individual article purchase or university library access is the realistic path. ~$1,200–2,000/year institutional.
- **Journal of Wildlife Rehabilitation** (IWRC membership, $54/year) — Low cost, high value. A $54 IWRC membership unlocks the archive. Strongly recommended.
- **Fowler's Zoo and Wild Animal Medicine series** (Elsevier) — Vols. 8 & 9 together cover the full zoo/wild animal medicine canon. Elsevier institutional access or volume purchase (~$150 each used).
- **Hand-Rearing Birds 2nd ed.** (Wiley, ~$120) — Single-purchase reference; worth acquiring for the library.
- **NWRA/IWRC Standards 5th ed.** (NWRA, $40 print) — Should be a base reference for any WildlifeStats clinical content.
- **Carpenter's Exotic Animal Formulary 6th ed.** (Elsevier, ~$70 ebook) — Essential for any clinical dosing content.

---

## Gaps and Market Observations

1. **No canonical national wildlife rehabilitation textbook for finders/the general public.** The current literature serves rehabilitators and veterinarians. There is no authoritative, nationally recognized, freely accessible guide for the member of the public who finds an injured animal — explaining what to do in the first hour, when to intervene vs. leave alone, how to safely contain the animal, and who to call. This is a significant content gap that WildlifeStats could fill with evidence-based, species-specific intake guidance pages. No incumbent publisher owns this space.

2. **No single comprehensive US songbird rehabilitation manual.** Hand-rearing protocols for passerines are scattered across Hand-Rearing Birds, the Principles of Wildlife Rehabilitation, and journal articles. A dedicated national songbird rehab manual does not exist. Gap confirmed across all sources reviewed.

3. **Hummingbird and swift rehabilitation is journal-article-only.** There is no book-length treatment of hummingbird or swift rehabilitation. Protocols are held in specialty networks (Hummingbird Society, Denny Inman's swift work) and individual IWRC course materials. This is a significant content gap for WildlifeStats species pages.

4. **Lindsay & Burnham raptor handbook** is frequently cited by older rehabilitators as an out-of-print reference but could not be confirmed as a standalone published title. The most likely candidate is the NWRA/IWRC-era Raptor Rehabilitation pocket guide or content within the older Minimum Standards editions. Raptor rehabilitation best practices are now dispersed across The Raptor Center (U of MN) publications, Lierz (2006), and the CWR reading list.

5. **State-specific regulatory gap.** No single authoritative compilation of state-level wildlife rehabilitation regulations exists in print or online. This is an ongoing maintenance burden for the field and a potential WildlifeStats database product (state-by-state permit requirements, species restrictions, reporting obligations).

6. **Free clinical protocols for marine mammals are notably absent** from the general rehabilitation literature — they exist within NOAA/NMFS network documentation and the Marine Mammal Center, but not in a freely citable public-facing format comparable to the USGS avian field manual.

7. **Outcome data standard does not exist.** There is no nationally standardized outcomes reporting framework analogous to a medical registry. USFWS annual reports collect admission/disposition data but not outcomes by injury type. This is the core WildlifeStats opportunity — building what does not yet exist.
