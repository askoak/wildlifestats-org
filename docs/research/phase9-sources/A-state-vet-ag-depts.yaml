# =============================================================================
# US State Veterinary & Agriculture Department Wildlife/Zoonotic-Disease Contacts
# =============================================================================
# Date compiled: 2026-06-11
# Methodology:
#   - Primary sources only: state .gov sites, USDA APHIS ADT Road Maps (aphis.usda.gov),
#     NAHRS/SAHO 2021 Handbook (iowaagriculture.gov/sites/default/files/animal-industry/pdf/Handbook/SAHO2021.pdf),
#     direct agency website fetches.
#   - Secondary cross-validation: USDA APHIS National List of Reportable Animal Diseases
#     (aphis.usda.gov/livestock-poultry-disease/surveillance/reportable-diseases),
#     Wisconsin DATCP nationwide contact compilation
#     (datcp.wi.gov/Documents/AHContactAcrossUS.pdf).
#   - State veterinarian names checked against current agency web pages where available;
#     where pages blocked or unavailable, the most recent confirmed name from SAHO 2021
#     or subsequent APHIS ADT submissions is used with a note.
#   - Wildlife disease program and dashboard fields reflect programs verifiably listed
#     on official .gov sites. "null" indicates information not publicly discoverable
#     from primary sources within the allotted research time.
#   - Jurisdiction order: alphabetical by 2-letter state/DC code.
# Scope: 51 jurisdictions (50 states + District of Columbia).
# =============================================================================

