# EIN data verified via ProPublica Nonprofit Explorer (projects.propublica.org/nonprofits).
# Ruling year (IRS recognition) used as proxy for founding year where website data is absent.
# Note: Not every state has a statewide member association; realistic count is 15–30 nationally.

