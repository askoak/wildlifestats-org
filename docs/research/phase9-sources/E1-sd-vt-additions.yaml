# E1 — SD + VT Gap Fill
# Agent E, 2026-06-11
#
# Adds 2 South Dakota and 2 Vermont organizations to close the SD/VT state gaps.
#
# Sources consulted:
#   SD Game, Fish & Parks wildlife-rehab page: https://gfp.sd.gov/wildlife-rehab/
#   CauseIQ: https://www.causeiq.com/organizations/black-hills-raptor-center,274423598/
#   ProPublica: https://projects.propublica.org/nonprofits/organizations/274423598
#   BirdRescues.org SD: http://birdrescues.org/south-dakota-bird-rescues-bird-rehabs-and-wildlife-hospitals/
#   Town & Country TLC Vet wildlife page: https://townandcountryvetsd.com/wildlife/
#   Vermont Fish & Wildlife licensed rehabber list (PDF): https://www.vtvets.org/assets/docs/Wildlife_Rehabilitator_Locator_Map.pdf
#   BirdRescues.org VT: http://birdrescues.org/vermont-bird-rescues-bird-rehabs-and-wildlife-hospitals/
#   ProPublica VINS: https://projects.propublica.org/nonprofits/organizations/30231665
#   CauseIQ Parkhill Wildlife Rehab VT: https://www.causeiq.com/organizations/parkhill-wildlife-rehab,933397141/
#
# Note on SD: SD Game, Fish & Parks explicitly states "South Dakota has very few licensed wildlife
# rehabilitators." There is NO publicly accessible state directory of individual rehabbers.
# The Black Hills Raptor Center and Town & Country TLC Vet are the only verifiable
# organizational-level (non-individual) rehab operations. A third SD center could not be
# confirmed with sufficient confidence for inclusion.
#
# Note on VT: Vermont's rehabbers are overwhelmingly individual licensees operating out of
# private residences. VINS (Vermont Institute of Natural Science) is the sole major institutional
# rehab center. Vermont Wildlife Rescue Association (Carol Winfield, Westford) is the
# next-best org-level candidate per the VT F&W list, but operates as a very small volunteer
# group without a dedicated website and was not found as a registered 501(c)(3). Only
# VINS is included as a high-confidence institutional entry. Parkhill Wildlife Rehab (VT,
# EIN 93-3397141) is noted as a newer small org.

