# Summary:
# Total organizations: 21
# Texas (12): Wildlife Center of Texas (Houston SPCA affiliate), Austin Wildlife Rescue,
#   All Things Wild Rehabilitation (Georgetown), Wild West Wildlife Rehabilitation Center (Amarillo),
#   Bat World Sanctuary (Weatherford), Wildlife Rescue & Rehabilitation (Kendalia),
#   South Plains Wildlife Rehabilitation Center (Lubbock), Last Chance Forever Bird of Prey
#   Conservancy (San Antonio), Friends of Texas Wildlife (Magnolia),
#   Bay Area Wildlife Rehabilitation (Friendswood), North Texas Wildlife Center (Plano),
#   DFW Wildlife Coalition (Richardson)
# Oklahoma (2): WildCare Oklahoma (Noble), Wild Heart Ranch (Claremore)
# Kansas (1): Operation Wildlife (Linwood)
# Nebraska (4): Nebraska Wildlife Rehab (Omaha), Wildlife Rescue Team (Lincoln),
#   Raptor Conservation Alliance (Elmwood), Fontenelle Forest Raptor Recovery (Bellevue)
# North Dakota (1): Dakota Zoo Raptor Rehabilitation (Bismarck)
# South Dakota (0): No credentialed standalone wildlife rehab 501(c)(3) identified with physical
#   facility and published presence. SD GFP notes very few licensed rehabilitators statewide.
#   Town & Country TLC Vet (Rapid City) accepts wildlife but is a for-profit vet practice.
#
# EXCLUDED:
# - TWRC Wildlife Center (Texas Wildlife Rehabilitation Coalition): Closed 2023 per IRS records
#   (filed final 990 indicating termination).
# - Houston Humane Society Wildlife Center: Paused wildlife rehab services in 2025; planning
#   future facility. Not currently active for intake.
# - Solo home rehabbers listed on TPWD county pages (no organizational 501c3 presence).
# - Lonestar Pets and Wildlife Sanctuary (Houston): Founded 2022; raccoon/fox specialty;
#   borderline given very limited published presence beyond Facebook.
#
# KEY DATA SOURCES:
# - Texas Parks & Wildlife Department TPWD rehabber list: https://tpwd.texas.gov/huntwild/wild/rehab/
# - Oklahoma Dept of Wildlife Conservation: https://www.wildlifedepartment.com/law/rehabilitator-list
