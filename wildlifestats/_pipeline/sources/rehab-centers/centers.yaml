# WildlifeStats National Rehab-Center Registry
#
# Canonical roster of US wildlife rehabilitation organizations. Compiled from
# five parallel regional research passes on 2026-06-11. This file is the
# canonical source for:
#   - The public-facing /centers/ directory page on wildlifestats.org
#   - The EIN join-key set for the Form 990 ingestion pipeline (Phase 8b)
#   - The per-center species-help-page indexer (Phase 8c)
#   - The annual-reports PDF extractor (Phase 8d)
#
# Total entries: 177 organizations across all 50 states + DC
# EIN-verified:  161 (the join key for Form 990 financial ingestion)
#
# Each entry follows the schema documented in
# docs/handoff/wildlifestats-national-rehab-center-registry-spec-2026-06-11.md
#
# Lane discipline (per Standing Orders §19, as clarified by Mike 2026-06-11):
# This registry treats every US wildlife rehab center symmetrically. BRWC is
# one row of N — listed alongside Wildlife Center of Virginia, Tufts, CROW,
# etc. The rule is that BRWC's RAW DATA RECORDS stay BRWC-only; brand-mention
# in this registry is legitimate public attribution.

