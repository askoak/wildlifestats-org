# USFWS Field Offices Catalog — Phase 9
# Sources:
#   Primary: https://www.fws.gov/about/regions
#   ES Contacts: https://www.fws.gov/program/ecological-services/contact-us
#   Migratory Bird Permits: https://www.fws.gov/program/migratory-bird-permits/contact-us
#   Regional HQ contacts: https://www.jobmonkey.com/parks/usfws_directory/ (cross-ref)
#   Western invasive mussel contacts: https://www.westernqzrr.com/regional-usfws-contacts
#   Region 3 permit info: https://www.fws.gov/sites/default/files/documents/2024-08/usfws-region-3-permit-contact-information_1.pdf
# Note: USFWS renamed regions from numbers to names (Pacific=1, Southwest=2, Midwest=3,
#       Southeast=4, Northeast=5, Mountain-Prairie=6, Alaska=7, Pacific Southwest=8).
#       Region 6 is now officially "Mountain-Prairie" and HQ moved from Denver to Lakewood, CO.
#       Some field-level contact info (phone/email/address) is not published on fws.gov office pages;
#       those values are sourced from cross-referenced official documents and the westernqzrr.com USFWS contacts.

